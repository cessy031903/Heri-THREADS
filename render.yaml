# NOTE: Render's free Postgres plan is auto-deleted 90 days after creation
# (no warning grace period). Before that deadline: Render dashboard ->
# heri-threads-db -> Settings -> Change Plan -> pick a paid tier.
# Track the creation date once this is first deployed.
databases:
  - name: heri-threads-db
    plan: free
    databaseName: heri_threads
    user: heri_threads

services:
  - type: web
    name: heri-threads
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Heri-THREADS
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: heri-threads
          property: host
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: heri-threads-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: heri-threads-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: heri-threads-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: heri-threads-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: heri-threads-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      # Free web service plan has no persistent disk, so the "public" disk
      # is backed by Cloudflare R2 (S3-compatible) instead of local storage.
      # Create a free R2 bucket + API token in the Cloudflare dashboard and
      # fill these in on the Render dashboard (they are not committed here).
      - key: PUBLIC_DISK_DRIVER
        value: s3
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: auto
      - key: AWS_BUCKET
        sync: false
      - key: AWS_ENDPOINT
        sync: false
      - key: AWS_USE_PATH_STYLE_ENDPOINT
        value: true
      - key: PUBLIC_DISK_URL
        sync: false
